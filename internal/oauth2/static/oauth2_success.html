<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>neomd — authenticated</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    ui-monospace, "SFMono-Regular", Menlo, Monaco, Consolas,
                    monospace;
                background: #1f1f28;
                color: #dcd7ba;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
            }
            .card {
                text-align: center;
                padding: 3rem 4rem;
                border: 1px solid #363646;
                border-radius: 8px;
                background: #2a2a37;
            }
            .check {
                font-size: 3rem;
                margin-bottom: 1rem;
            }
            h1 {
                font-size: 1.4rem;
                font-weight: 600;
                color: #98bb6c;
                margin-bottom: 0.75rem;
            }
            p {
                font-size: 0.95rem;
                color: #9cabca;
                line-height: 1.6;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="check">✓</div>
            <h1>Authentication successful</h1>
            <p>You can close this tab and return to neomd.</p>
        </div>
    </body>
</html>
